name: Daily Bio News

on:
  # JST 10:00 = UTC 01:00
  schedule:
    - cron: '0 1 * * *'
  # テスト用：GitHub の Actions タブから手動実行できる
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # HTML を commit/push するために必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: ニュース取得・HTML生成（要約・ページ保存）
        run: node fetch-rss.js
        env:
          BASE_URL: https://ayano330.github.io/bio-news
          OUTPUT_ROOT: .
          SKIP_LINE: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}

      - name: 生成した HTML をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bio-news/
          # 差分があるときだけコミットする（変化なしでも失敗しない）
          git diff --cached --quiet || git commit -m "chore: daily bio news $(TZ=Asia/Tokyo date +%Y-%m-%d)"
          git push

      - name: LINE 送信（プッシュ後・リンクが生きてから）
        run: node fetch-rss.js --send-line
        env:
          OUTPUT_ROOT: .
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
